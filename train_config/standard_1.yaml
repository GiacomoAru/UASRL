# --- CONFIGURAZIONE ESPERIMENTO ---
exp_name: "test_train"
env_id: "4xstd"
seed: 2205
cuda: true
torch_deterministic: true
total_timesteps: 50000

# --- RETI NEURALI ---
# Liste di interi che definiscono i nodi per ogni livello nascosto
input_stack : 4
actor_network_layers: [256,256]
q_network_layers: [256,256]
q_ensemble_n: 3  # Numero di reti Q nell'ensemble

# --- LEARNING RATES ---
policy_lr: 0.0003
q_lr: 0.0003
alpha_lr: 0.0001

# --- PARAMETRI BUFFER E BATCH ---
buffer_size: 200000
batch_size: 256
learning_starts: 25  # Passi casuali iniziali
bootstrap_batch_proportion: 0.85
bootstrap: false  # Se usare il bootstrap nell'ensemble Q

# --- IPERPARAMETRI RL ---
gamma: 0.995           # Discount factor  
tau: 0.005              # Soft update per target networks
alpha: 1.0             # Coefficiente entropia iniziale
autotune: true         # Tuning automatico di alpha
noise_clip: 0.1
reward_scale: 0.1

# --- AGGIORNAMENTI E FREQUENZE ---
update_per_step: 1            # Quanti gradient updates per step ambientale
policy_frequency : 4          # Ogni quanti step gradiente aggiornare la policy
target_network_frequency: 2   # Ogni quanti step aggiornare la target net

# --- LOGGING E METRICHE ---
loss_log_interval: 100
metrics_log_interval: 300
metrics_smoothing: 0.985